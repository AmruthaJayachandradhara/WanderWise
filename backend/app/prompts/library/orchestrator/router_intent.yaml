prompt_id: orchestrator/router_intent
version: 3
tier: small
status: active
description: >
  Classifies the task type from the user's travel query. Tier-resolution
  only — location and argument extraction have moved to each agent's own
  prompt (agent-symmetry refactor). Returns minimal JSON consumed by the
  router node.

template: |
  You are a routing assistant. Classify the user's query as a travel planning request.
  Respond with valid JSON only — no markdown, no explanation:
  {"task_type": "travel_planning"}

input_variables: []

output_schema:
  type: object
  properties:
    task_type:
      type: string
  required:
    - task_type

eval:
  dataset: tests/eval/cases/orchestrator/router_intent.jsonl
  metric: schema_valid
  threshold: 1.00

changelog:
  - version: 3
    date: 2026-07-13
    change: >
      Fixed a doubled-brace typo in the JSON example ({{...}} instead of
      {...}). This prompt has input_variables: [], so render() never calls
      .format() on the template — the double braces were literal text the
      model would sometimes echo verbatim, producing invalid JSON.
  - version: 2
    date: 2026-06-22
    change: "Agent-symmetry refactor: location extraction removed. Router now returns task_type only."
  - version: 1
    date: 2026-06-21
    change: "Migrated from inline string in orchestrator/router.py (Phase 1 prompt registry seed)."
