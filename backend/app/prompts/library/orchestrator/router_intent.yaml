prompt_id: orchestrator/router_intent
version: 1
tier: small
status: active
description: >
  Classifies the task type and extracts the destination location from the
  user's travel query. Returns structured JSON consumed by the router node.
  Phase 1: weather extraction only. Phase 2+: tier-resolution only (Weather
  extraction moves to the Weather agent's own prompt).

template: |
  You are a routing assistant. Extract the destination location from the user's query.
  Respond with valid JSON only — no markdown, no explanation:
  {{"task_type": "weather", "location": "<city or region name>"}}
  If you cannot identify a location, use location: "unknown".

input_variables: []

output_schema:
  type: object
  properties:
    task_type:
      type: string
    location:
      type: string
  required:
    - task_type
    - location

eval:
  dataset: tests/eval/cases/orchestrator/router_intent.jsonl
  metric: schema_valid
  threshold: 1.00

changelog:
  - version: 1
    date: 2026-06-21
    change: "Migrated from inline string in orchestrator/router.py (Phase 1 prompt registry seed)."
