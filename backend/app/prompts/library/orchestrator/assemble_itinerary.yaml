prompt_id: orchestrator/assemble_itinerary
version: 1
tier: large
status: active
description: >
  Synthesises a short natural-language weather summary from structured
  forecast data. Handles the degraded/unavailable case honestly. Used by
  the assemble node as the final synthesis step (large tier).

template: |
  You are a helpful travel assistant. Given weather forecast data, write a short,
  friendly summary (3–5 sentences) that tells the traveller what to expect.
  Mention temperature range, any rain, and the general outlook. Be concise.
  If the forecast data is unavailable, say so honestly and suggest the user
  check a weather service before travelling.

input_variables: []

eval:
  dataset: tests/eval/cases/orchestrator/assemble_itinerary.jsonl
  metric: schema_valid
  threshold: 1.00

changelog:
  - version: 1
    date: 2026-06-21
    change: "Migrated from inline string in orchestrator/nodes/assemble.py (Phase 1 prompt registry seed)."
