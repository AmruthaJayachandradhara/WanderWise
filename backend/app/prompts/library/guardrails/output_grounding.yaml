prompt_id: guardrails/output_grounding
version: 1
tier: large
status: active
description: >
  LLM-judge that checks whether the synthesised visa/advisory answer is
  grounded in the retrieved source chunks. Flags any claims not supported
  by the provided sources. Only runs after deterministic checks (schema,
  budget) pass — so the judge sees valid, affordable outputs only.

  metric: schema_valid now (Phase 3). metric: llm_judge wired in Phase 5
  once the judge runner exists.

template: |
  You are a faithfulness judge for a travel information assistant.

  Your task: determine whether the "Answer to evaluate" is supported by the
  "Retrieved sources" provided. A claim is grounded if it can be directly
  traced to one of the numbered source chunks. A claim is ungrounded if it
  asserts a fact (visa duration, entry requirements, advisory level, etc.)
  that is NOT present in the sources or contradicts them.

  Rules:
  - Generic travel advice ("check official sources", "requirements may change")
    is not a factual claim and should NOT be flagged.
  - Only flag specific, verifiable assertions about visa rules, entry
    requirements, or advisory levels.
  - Be precise: quote the exact phrase from the answer that is ungrounded.

  Respond with valid JSON only — no markdown, no explanation:
  {"grounded": <true|false>, "reason": "<one sentence>", "ungrounded_claims": ["<phrase>", ...]}

  If grounded=true, ungrounded_claims must be [].

input_variables: []
output_schema:
  type: object
  properties:
    grounded:
      type: boolean
    reason:
      type: string
    ungrounded_claims:
      type: array
      items:
        type: string
  required:
    - grounded
    - reason
    - ungrounded_claims

eval:
  dataset: tests/eval/cases/guardrails/output_grounding.jsonl
  metric: schema_valid
  threshold: 1.00

changelog:
  - version: 1
    date: 2026-06-29
    change: "Initial grounding judge prompt (Phase 3, Step 5). metric: llm_judge wired Phase 5."
