name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      # uv-managed venvs omit pip by design. Some packages (spaCy's downloader,
      # potential future presidio plugins) shell out to pip at runtime.
      # Injecting pip once here fixes the class of problem for all future phases.
      - name: Inject pip into venv
        run: uv pip install pip

      # Restore cached fastembed ONNX model files to avoid re-downloading
      # ~80 MB from HuggingFace on every CI run.
      # Cache is keyed on pyproject.toml so a dependency bump invalidates it.
      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-${{ hashFiles('pyproject.toml') }}

      # Pre-install the spaCy model into the venv (same as Dockerfile).
      # pip is now available (step above), so this succeeds even on a cache miss.
      - name: Install spaCy model
        run: uv run python -m spacy download en_core_web_lg

      # Warm up the fastembed model on a cache miss so it's ready before tests.
      # On a cache hit this is instant (model files already present).
      - name: Warm up fastembed model
        run: uv run python -c "from fastembed import TextEmbedding; TextEmbedding('BAAI/bge-small-en-v1.5')"

      - name: Lint (ruff)
        run: uv run ruff check backend/

      - name: Run pytest
        run: uv run pytest backend/tests/unit/ -v --tb=short

      # Smoke: run only the router prompt (3 cases) to stay within free-tier
      # quota. Full per-prompt eval across all 13 prompts will be re-enabled
      # in Phase 5 once a fallback provider (Groq / cached) is wired in.
      - name: Run per-prompt eval gate (smoke)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LANGSMITH_TRACING: "false"
          TRACE_SAMPLING: "0"
        run: uv run python backend/tests/eval/run_prompt_eval.py orchestrator/router_intent

      # Give Gemini free-tier quota (10 RPM) time to recover after the
      # per-prompt eval calls before hitting the graph eval.
      - name: Rate-limit cooldown
        run: sleep 30

      # 3-case smoke eval: happy-path trip, injection block (regex — no LLM
      # quota), and false-block prevention. All three pass even on 429 because
      # the graph degrades gracefully to a non-empty stub response.
      - name: Run eval gate (smoke)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Disable LangSmith tracing in CI to conserve free-tier quota
          LANGSMITH_TRACING: "false"
          TRACE_SAMPLING: "0"
        run: uv run python backend/tests/eval/run_eval.py

  # Deploy job — runs only on merge to main after tests pass
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}  # e.g. username/wanderwise
        run: |
          git config --global user.email "ci@wanderwise"
          git config --global user.name "WanderWise CI"
          git remote add hf https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}
          git push hf HEAD:main --force
